<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>weirdinsect</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

#door{
    color:#fff;
    font-size:10px;
    font-family:monospace;
    cursor:pointer;
    opacity:0;
    transition:opacity .5s,transform .2s;
    user-select:none;
}

#door:hover{
    transform:scale(1.2);
}
</style>
</head>

<body>

<div id="door" onclick="location.href='hidden.html'">🚪</div>

<audio id="bg-music" loop>
    <source src="Crystal Castles - Fleece.mp3" type="audio/mpeg">
</audio>

<script>
setTimeout(() => {
    document.getElementById("door").style.opacity = "1";
}, 3000);

document.addEventListener("click", () => {
    const audio = document.getElementById("bg-music");
    if (audio.paused) audio.play();
}, { once: true });
</script>

</body>
</html>
