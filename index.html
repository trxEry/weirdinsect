<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>weirdinsect</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    #numbers {
      color: white;
      font-family: monospace;
      font-size: 12px;
      opacity: 0;
      transition: opacity .5s;
    }
  </style>
</head>

<body>

  <div id="numbers">0x545259</div>

  <audio id="bg-music" loop>
    <source src="Crystal Castles - Fleece.mp3" type="audio/mpeg">
  </audio>

  <script>
    setTimeout(() => {
      document.getElementById("numbers").style.opacity = "1";
    }, 2000);

    document.addEventListener("click", () => {
      const audio = document.getElementById("bg-music");
      if (audio.paused) audio.play();
    }, { once: true });
  </script>

</body>
</html>
