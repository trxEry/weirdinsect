<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>weirdinsect</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    #numbers {
      color: #fff;
      font: 12px monospace;
      opacity: 0;
      transition: opacity .5s;
      user-select: none;
    }
  </style>
</head>
<body>

  <div id="numbers">0x545259</div>

  <audio id="bg-music" loop>
    <source src="Crystal Castles - Fleece.mp3" type="audio/mpeg">
  </audio>

  <script>
    // Show text after 3 seconds
    setTimeout(() => {
      document.getElementById("numbers").style.opacity = "1";
    }, 3000);

    // Play music on first click
    document.addEventListener("click", () => {
      const audio = document.getElementById("bg-music");
      if (audio.paused) audio.play();
    }, { once: true });
  </script>

</body>
</html>
