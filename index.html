<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>weirdinsect</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    background:#000;
    color:#fff;
    font-family:monospace;
    overflow:hidden;
    transition: opacity 2s ease;
}

.screen{
    display:none;
    width:100%;
    height:100%;
    position:relative;
}

.active{
    display:block;
}

#numbers{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    opacity:0;
    transition:.5s;
    font-size:12px;
}

.door{
    position:absolute;
    opacity:0;
    transition:.5s;
    cursor:pointer;
    font-size:18px;
    z-index:10;
}

#tl{top:20px;left:20px}
#tr{top:20px;right:20px}
#bl{bottom:20px;left:20px}
#br{bottom:20px;right:20px}

.back{
    position:absolute;
    top:20px;
    left:20px;
    cursor:pointer;
    color: #888;
}

.center{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

.eye{
    position:absolute;
    font-size:16px;
}

button{
    background:#111;
    color:#fff;
    border:1px solid #666;
    padding:10px 20px;
    font-family:monospace;
    margin: 5px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #333;
    border-color: #aaa;
}

button:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    border-color: #333;
}

/* Game specific styles */
.game-text {
    font-size: 18px;
    margin-bottom: 20px;
    min-height: 60px;
    line-height: 1.4;
}

.game-result {
    font-size: 22px;
    font-weight: bold;
    margin: 20px 0;
    min-height: 40px;
    color: #fff;
}

.game-msg {
    font-size: 18px;
    color: #ff0000;
    min-height: 30px;
    font-weight: bold;
    margin-top: 10px;
}

.red-text {
    color: #ff0000 !important;
}

/* Animation for the flash effect */
@keyframes flash {
    0%{opacity:1}
    50%{opacity:.2}
    100%{opacity:1}
}
</style>
</head>

<body>

<div id="main" class="screen active">
    <div id="numbers">0x545259</div>
    <div id="tl" class="door">🚪</div>
    <div id="tr" class="door">🚪</div>
    <div id="bl" class="door">🚪</div>
    <div id="br" class="door">🚪</div>
</div>

<div id="p1" class="screen">
    <div class="back">← Back</div>
    <div class="center">
        📁<br><br>
        There's nothing to see.<br><br>
        Try → Top Right
    </div>
</div>

<div id="p2" class="screen">
    <div class="back">← Back</div>
    <div class="center">
        You're not supposed to be here.<br><br>
        Try ← Top Left
    </div>
</div>

<div id="p3" class="screen">
    <div class="back">← Back</div>
    <div id="eyebox" class="center">
        I said...<br><br>
        Try Top Right.
    </div>
</div>

<!-- THE GAME SCREEN -->
<div id="p4" class="screen">
    <div class="back">← Back</div>
    <div class="center">
        <!-- The Start Button -->
        <button id="startTryBtn">Try</button>
        
        <!-- Dynamic Content Area -->
        <div id="gameArea" style="display:none; margin-top:20px;">
            <div id="gameStatus" class="game-text"></div>
            <div id="gameResult" class="game-result"></div>
            
            <div id="gameControls" style="display:none; margin-top:20px;">
                <button class="rps-btn" data-choice="rock">✊ Rock</button>
                <button class="rps-btn" data-choice="paper">✋ Paper</button>
                <button class="rps-btn" data-choice="scissors">✌ Scissors</button>
            </div>
            
            <div id="gameMessage" class="game-msg"></div>
        </div>
    </div>
</div>

<div id="crash" class="screen">
    <div class="center" id="crashText"></div>
</div>

<video id="horrorVideo" style="display:none;width:100%;height:100%" autoplay playsinline loop>
    <source src="WEIRDINSECT001.mp4" type="video/mp4">
</video>

<audio id="bg" loop>
    <source src="Crystal Castles - Fleece.mp3" type="audio/mpeg">
</audio>

<script>
const numbers = document.getElementById("numbers");
const doors = document.querySelectorAll(".door");
const bg = document.getElementById("bg");

// Initial fade in
setTimeout(()=>{
    numbers.style.opacity = 1;
    doors.forEach(d => d.style.opacity = 1);
}, 3000);

// Audio start on first click
document.addEventListener("click", () => {
    if (bg.paused) bg.play().catch(e => console.log("Audio blocked:", e));
}, {once: true});

function show(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// Initial door logic
tl.onclick = () => show("p1");
tr.onclick = () => show("p4"); // Go to game screen
bl.onclick = () => show("p3");
br.onclick = () => show("p2");

document.querySelectorAll(".back").forEach(b => {
    b.onclick = () => show("main");
});

// --- EYE SPAWNING LOGIC (p3) ---
let started = false;
bl.onclick = () => {
    show("p3");
    if (started) return;
    started = true;

    let eyes = [];
    let count = 0;
    let spawn = setInterval(() => {
        if (!document.getElementById("p3").classList.contains("active")) return;
        let e = document.createElement("div");
        e.className = "eye";
        e.textContent = "◉";
        e.style.left = Math.random() * 95 + "%";
        e.style.top = Math.random() * 95 + "%";
        e.style.color = "rgb(255, 255, 255)";
        document.getElementById("p3").appendChild(e);
        eyes.push(e);
        count++;
        if (count >= 80) clearInterval(spawn);
    }, 1000);

    setTimeout(() => {
        setInterval(() => {
            let white = eyes.filter(e => e.style.color !== "rgb(122, 0, 0)");
            for (let i = 0; i < 2 && white.length; i++) {
                let r = Math.floor(Math.random() * white.length);
                white[r].style.color = "#7a0000";
                white.splice(r, 1);
            }
        }, 700);
    }, 5000);
};

// --- SEQUENCE LOGIC ---

// 1. Questions Data
const questions = [
    ["Do you remember entering this place?", "Then you remember something I don't.", "Good. Some things are better forgotten."],
    ["A small light appears in the darkness.\nYou cannot see its source.\nWould you look closer?", "You moved toward it.\nMost people do.", "You looked away.\nBut it was still there."],
    ["A file appears.\n\nName:\nDO NOT OPEN\n\nWould you open it?", "You opened the thing you were warned about.\nThe first mark has appeared.", "You left it closed.\nFor now."],
    ["Someone writes:\n\n'I have been waiting.'\n\nWould you reply?", "You answered.\nSomething heard you.\nSomething closer.", "You stayed silent.\nSomething noticed."],
    ["The website freezes.\n\n'Leave before the last question.'\n\nWould you continue?", "You chose to stay.\nThe screen is changing.", "You tried to leave.\nBut you already started."],
    ["You see an old picture.\n\nYou don't remember taking it.\n\nWould you look closer?", "You searched for an answer.\nThe answer was already looking at you.", "You avoided the picture.\nThe picture remained."],
    ["Are you sure you want to know what is hidden here?", "Curiosity brought you this far.\nThere is no going back now.", "Fear tried to stop you.\nBut the test continued."],
    ["The test is complete.\n\nOPEN\n\nBehind this button is something that was never meant to be found.", "", ""]
];

let qIndex = 0;
let typingTimer;
let gamePhase = false; // false = questions, true = game

const startBtn = document.getElementById("startTryBtn");
const gameArea = document.getElementById("gameArea");
const gameStatus = document.getElementById("gameStatus");
const gameResult = document.getElementById("gameResult");
const gameControls = document.getElementById("gameControls");
const gameMessage = document.getElementById("gameMessage");
const rpsButtons = document.querySelectorAll(".rps-btn");

// Typing effect function
function typing(text, element, speed = 30, done) {
    clearInterval(typingTimer);
    element.textContent = "";
    let i = 0;
    typingTimer = setInterval(() => {
        if (i >= text.length) {
            clearInterval(typingTimer);
            if (done) done();
            return;
        }
        element.textContent += text.charAt(i);
        i++;
    }, speed);
}

// START BUTTON CLICK
startBtn.onclick = () => {
    startBtn.style.display = "none";
    gameArea.style.display = "block";
    gamePhase = false; // Start with questions
    qIndex = 0;
    loadQuestion();
};

function loadQuestion() {
    let q = questions[qIndex];
    let ansBox = document.getElementById("answers") || document.createElement("div");
    if (!ansBox.id) {
        ansBox.id = "answers";
        ansBox.style.marginTop = "20px";
        gameArea.appendChild(ansBox);
    }
    ansBox.innerHTML = "";

    typing(q[0], gameStatus, 30, () => {
        setTimeout(() => {
            let yes = document.createElement("button");
            yes.textContent = "YES";
            yes.onclick = () => answer(q[1]);

            let no = document.createElement("button");
            no.textContent = "NO";
            no.onclick = () => answer(q[2]);

            ansBox.appendChild(yes);
            ansBox.appendChild(no);
        }, 500);
    });
}

function answer(text) {
    let ansBox = document.getElementById("answers");
    ansBox.innerHTML = "";
    typing(text, gameStatus, 30, () => {
        setTimeout(() => {
            qIndex++;
            if (qIndex >= 8) {
                // All questions done, start the game
                startGame();
            } else {
                if (qIndex === 2) {
                    document.body.style.animation = "flash .2s";
                    setTimeout(() => document.body.style.animation = "", 200);
                }
                loadQuestion();
            }
        }, 2000);
    });
}

// GAME START
function startGame() {
    gamePhase = true;
    let ansBox = document.getElementById("answers");
    if (ansBox) ansBox.innerHTML = "";
    
    let gameRound = 0;
    const trollMessages = ["Loser.", "Really ?", "U can't", "Just stop", "HahA"];
    const tryPickMessages = ["Try picks ✋ Paper.", "Try picks ✌ Scissors.", "Try picks ✊ Paper.", "Try picks ✋ Paper.", "Try chooses."];
    
    // Rigged map: whatever you pick, Try picks the winner
    const tryWins = { "rock": "paper", "paper": "scissors", "scissors": "rock" };

    gameStatus.textContent = "Round 1: Can you beat me?";
    gameResult.textContent = "";
    gameMessage.textContent = "";
    gameControls.style.display = "block";
    
    // Re-enable buttons
    rpsButtons.forEach(btn => {
        btn.disabled = false;
        btn.style.opacity = "1";
    });

    // Attach click events dynamically to ensure they work
    rpsButtons.forEach(btn => {
        btn.onclick = function() {
            // Prevent double clicks
            if (this.classList.contains('clicked')) return;
            this.classList.add('clicked');
            
            const playerChoice = this.getAttribute("data-choice");
            const tryChoice = tryWins[playerChoice];
            
            // Show result
            let pIcon = playerChoice === "rock" ? "✊" : (playerChoice === "paper" ? "✋" : "✌");
            let tIcon = tryChoice === "rock" ? "✊" : (tryChoice === "paper" ? "✋" : "✌");
            
            gameResult.textContent = `You: ${pIcon} | Try: ${tIcon}`;
            gameMessage.textContent = trollMessages[gameRound];
            gameMessage.className = "game-msg red-text";
            
            // Disable buttons
            rpsButtons.forEach(b => {
                b.disabled = true;
                b.classList.add('clicked');
            });
            gameControls.style.pointerEvents = "none";

            gameRound++;

            setTimeout(() => {
                if (gameRound < 5) {
                    gameResult.textContent = "";
                    gameMessage.textContent = "";
                    gameStatus.textContent = `Round ${gameRound + 1}`;
                    gameMessage.textContent = tryPickMessages[gameRound];
                    
                    setTimeout(() => {
                        gameMessage.textContent = "";
                        gameControls.style.pointerEvents = "auto";
                        rpsButtons.forEach(b => {
                            b.disabled = false;
                            b.classList.remove('clicked');
                            b.style.opacity = "1";
                        });
                    }, 1200);
                } else {
                    // Game Over
                    gameStatus.textContent = "Game Complete.";
                    gameStatus.className = "game-text red-text";
                    
                    setTimeout(() => {
                        gameControls.style.display = "none";
                        bg.pause();
                        bg.currentTime = 0;
                        gameMessage.textContent = "";
                        
                        setTimeout(() => {
                            triggerHorrorSequence();
                        }, 4000);
                    }, 1500);
                }
            }, 1500);
        };
    });
}

function triggerHorrorSequence() {
    document.body.style.opacity = "0";
    setTimeout(() => {
        document.querySelectorAll(".screen").forEach(s => s.style.display = "none");
        const video = document.getElementById("horrorVideo");
        video.style.display = "block";
        video.play().catch(e => console.log("Video play failed:", e));
    }, 2000);
}
</script>
</body>
</html>
