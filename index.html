<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>weirdinsect</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    background:#000;
    color:#fff;
    font-family:monospace;
    overflow:hidden;
    transition: opacity 2s ease; /* Smooth fade to black */
}

.screen{
    display:none;
    width:100%;
    height:100%;
    position:relative;
}

.active{
    display:block;
}

#numbers{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    opacity:0;
    transition:.5s;
    font-size:12px;
}

.door{
    position:absolute;
    opacity:0;
    transition:.5s;
    cursor:pointer;
    font-size:18px;
    z-index:10;
}

#tl{top:20px;left:20px}
#tr{top:20px;right:20px}
#bl{bottom:20px;left:20px}
#br{bottom:20px;right:20px}

.back{
    position:absolute;
    top:20px;
    left:20px;
    cursor:pointer;
}

.center{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

.eye{
    position:absolute;
    font-size:16px;
}

button{
    background:#111;
    color:#fff;
    border:1px solid #666;
    padding:5px 15px;
    font-family:monospace;
    margin: 5px;
    cursor: pointer;
}

button:hover {
    background: #333;
}

/* Game specific styles */
.game-text {
    font-size: 18px;
    margin-bottom: 20px;
    min-height: 60px;
}

.game-result {
    font-size: 24px;
    font-weight: bold;
    margin: 20px 0;
    min-height: 40px;
}

.game-btn-row {
    margin-top: 20px;
}

.red-text {
    color: #ff0000;
}

/* Animation for the flash effect */
@keyframes flash {
    0%{opacity:1}
    50%{opacity:.2}
    100%{opacity:1}
}
</style>
</head>

<body>

<div id="main" class="screen active">

<div id="numbers">0x545259</div>

<div id="tl" class="door">🚪</div>
<div id="tr" class="door">🚪</div>
<div id="bl" class="door">🚪</div>
<div id="br" class="door">🚪</div>

</div>


<div id="p1" class="screen">
<div class="back">← Back</div>
<div class="center">
📁<br><br>
There's nothing to see.<br><br>
Try → Top Right
</div>
</div>


<div id="p2" class="screen">
<div class="back">← Back</div>
<div class="center">
You're not supposed to be here.<br><br>
Try ← Top Left
</div>
</div>


<div id="p3" class="screen">
<div class="back">← Back</div>
<div id="eyebox" class="center">
I said...<br><br>
Try Top Right.
</div>
</div>


<!-- THE GAME SCREEN -->
<div id="p4" class="screen">
<div class="back">← Back</div>
<div class="center">
    <div id="gameStatus" class="game-text">Can you beat me?</div>
    <div id="gameResult" class="game-result"></div>
    
    <div id="gameControls" class="game-btn-row">
        <button class="rps-btn" data-choice="rock">✊ Rock</button>
        <button class="rps-btn" data-choice="paper">✋ Paper</button>
        <button class="rps-btn" data-choice="scissors">✌ Scissors</button>
    </div>
    
    <div id="gameMessage" style="margin-top:15px; font-size:12px; color:#666;"></div>
</div>
</div>


<div id="crash" class="screen">
<div class="center" id="crashText"></div>
</div>

<video id="horrorVideo" style="display:none;width:100%;height:100%" autoplay playsinline loop>
<source src="WEIRDINSECT001.mp4" type="video/mp4">
</video>


<audio id="bg" loop>
<source src="Crystal Castles - Fleece.mp3" type="audio/mpeg">
</audio>


<script>

const numbers=document.getElementById("numbers");
const doors=document.querySelectorAll(".door");

setTimeout(()=>{
    numbers.style.opacity=1;
    doors.forEach(d=>d.style.opacity=1);
},3000);


document.addEventListener("click",()=>{
    if(bg.paused) bg.play().catch(e=>console.log(e));
},{once:true});


function show(id){
    document.querySelectorAll(".screen")
    .forEach(s=>s.classList.remove("active"));

    document.getElementById(id)
    .classList.add("active");
}


// Initial door logic
tl.onclick=()=>show("p1");
tr.onclick=()=>show("p2");
bl.onclick=()=>show("p3");
br.onclick=()=>show("p4");


document.querySelectorAll(".back")
.forEach(b=>{
    b.onclick=()=>show("main");
});


// --- EYE SPAWNING LOGIC (p3) ---
let started=false;

bl.onclick=()=>{
    show("p3");

    if(started)return;
    started=true;

    let eyes=[];
    let count=0;

    let spawn=setInterval(()=>{

        if(!document.getElementById("p3").classList.contains("active"))
            return;

        let e=document.createElement("div");

        e.className="eye";
        e.textContent="◉";
        e.style.left=Math.random()*95+"%";
        e.style.top=Math.random()*95+"%";
        e.style.color = "rgb(255, 255, 255)";

        document.getElementById("p3").appendChild(e);

        eyes.push(e);

        count++;

        if(count>=80)
            clearInterval(spawn);

    },1000);

    setTimeout(()=>{

        setInterval(()=>{

            let white=eyes.filter(
            e=>e.style.color!=="rgb(122, 0, 0)"
            );

            for(let i=0;i<2 && white.length;i++){

                let r=Math.floor(Math.random()*white.length);

                white[r].style.color="#7a0000";

                white.splice(r,1);
            }

        },700);

    },5000);
};


// --- ROCK PAPER SCISSORS TRAP LOGIC (p4) ---
const gameStatus = document.getElementById("gameStatus");
const gameResult = document.getElementById("gameResult");
const gameControls = document.getElementById("gameControls");
const gameMessage = document.getElementById("gameMessage");
const rpsButtons = document.querySelectorAll(".rps-btn");

let round = 0;
let gameActive = false;

// The Rigged Logic: Site always wins
const siteWins = {
    "rock": "paper",
    "paper": "scissors",
    "scissors": "rock"
};

const roundMessages = [
    "Can you beat me?",
    "Again...",
    "Haha.",
    "Final Round"
];

const sitePickMessages = [
    "The site picks Paper.",
    "The site picks Scissors.",
    "The site picks Paper.",
    "The site chooses."
];

function resetGameUI() {
    gameResult.textContent = "";
    gameMessage.textContent = "";
    gameControls.style.opacity = "1";
    gameControls.style.pointerEvents = "auto";
    rpsButtons.forEach(btn => btn.disabled = false);
}

function playRound(playerChoice, siteChoice) {
    gameResult.textContent = `You: ${playerChoice.toUpperCase()} | Site: ${siteChoice.toUpperCase()}`;
    gameMessage.textContent = "Loser.";
    gameMessage.className = "game-result red-text";
    
    // Disable buttons immediately
    rpsButtons.forEach(btn => btn.disabled = true);
    gameControls.style.pointerEvents = "none";

    round++;

    setTimeout(() => {
        if (round < 4) {
            gameResult.textContent = "";
            gameMessage.textContent = "";
            gameStatus.textContent = roundMessages[round];
            
            // Subtle "glitch" or pause between rounds
            setTimeout(() => {
                resetGameUI();
                gameMessage.textContent = sitePickMessages[round]; // Show what site picked next
                setTimeout(() => {
                    gameMessage.textContent = "";
                }, 1000);
            }, 1000);
            
        } else {
            // Round 4 is the end
            gameStatus.textContent = "Game Complete.";
            gameStatus.className = "game-text red-text";
            
            setTimeout(() => {
                // Buttons disappear
                gameControls.style.display = "none";
                
                // Silence and wait
                bg.pause();
                bg.currentTime = 0;
                
                gameMessage.textContent = "";
                
                // Wait 4 seconds in silence
                setTimeout(() => {
                    triggerHorrorSequence();
                }, 4000);
                
            }, 1500);
        }
    }, 1500);
}

function triggerHorrorSequence() {
    // Fade to black
    document.body.style.opacity = "0";
    
    setTimeout(() => {
        // Hide all screens
        document.querySelectorAll(".screen").forEach(s => s.style.display = "none");
        
        // Show video
        const video = document.getElementById("horrorVideo");
        video.style.display = "block";
        video.play().catch(e => console.log("Video play failed:", e));
    }, 2000);
}

rpsButtons.forEach(btn => {
    btn.onclick = function() {
        if (!gameActive) {
            gameActive = true;
            round = 0;
            gameStatus.textContent = roundMessages[round];
        }
        
        const playerChoice = this.getAttribute("data-choice");
        const siteChoice = siteWins[playerChoice];
        
        playRound(playerChoice, siteChoice);
    };
});

// Fallback for the old "Try" button behavior if needed, 
// but now the "Try" button in p4 is replaced by the game itself.
// We just need to ensure p4 loads correctly.
// The "Back" button in p4 still works to return to main.

</script>

</body>
</html>
