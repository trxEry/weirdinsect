#bl{bottom:20px;left:20px}

    line-height: 1.6;
    font-size: 18px;
}

.eye{
    position:absolute;
    font-size:16px;
}

button{

    border:1px solid #666;

}

button:hover {

}

}

}
</style>
</head>

setTimeout(() => {

    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

document.querySelectorAll(".back").forEach(b => {
    b.onclick = () => show("main");
});
