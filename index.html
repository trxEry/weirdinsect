<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>weirdinsect</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
    font-family:monospace;
}

/* Center text */
#numbers{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:#fff;
    font-size:12px;
    opacity:0;
    transition:opacity .5s;
    user-select:none;
}

/* Tiny door in bottom-right corner */
#door{
    position:fixed;
    bottom:12px;
    right:12px;
    color:#fff;
    font-size:10px;
    cursor:pointer;
    opacity:0;
    transition:opacity .5s,transform .2s;
    user-select:none;
}

#door:hover{
    transform:scale(1.2);
}
</style>
</head>

<body>

<div id="numbers">0x545259</div>

<div id="door" onclick="location.href='hidden.html'">🚪</div>

<audio id="bg-music" loop>
    <source src="Crystal Castles - Fleece.mp3" type="audio/mpeg">
</audio>

<script>
setTimeout(() => {
    document.getElementById("numbers").style.opacity = "1";
    document.getElementById("door").style.opacity = "1";
}, 3000);

document.addEventListener("click", () => {
    const audio = document.getElementById("bg-music");
    if (audio.paused) audio.play();
}, { once: true });
</script>

</body>
</html>
