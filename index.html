<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>weirdinsect</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
    font-family:monospace;
    color:#fff;
}

/* Main screen */
#main{
    width:100%;
    height:100%;
}

#numbers{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:12px;
    opacity:0;
    transition:.5s;
    user-select:none;
}

#door{
    position:fixed;
    top:12px;
    right:12px;
    font-size:12px;
    cursor:pointer;
    opacity:0;
    transition:.5s;
    user-select:none;
}

#door:hover{
    transform:scale(1.15);
}

/* Hidden screen */
#hidden{
    display:none;
    width:100%;
    height:100%;
}

#folder{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    font-size:12px;
    user-select:none;
}

#back{
    position:fixed;
    top:12px;
    left:12px;
    cursor:pointer;
    font-size:12px;
}
</style>
</head>

<body>

<div id="main">
    <div id="numbers">0x545259</div>
    <div id="door">🚪</div>
</div>

<div id="hidden">
    <div id="back">←</div>

    <div id="folder">
        📁<br><br>
        There's nothing to see.
    </div>
</div>

<audio id="bg-music" loop>
    <source src="Crystal Castles - Fleece.mp3" type="audio/mpeg">
</audio>

<script>
setTimeout(() => {
    numbers.style.opacity = "1";
    door.style.opacity = "1";
}, 3000);

document.addEventListener("click", () => {
    const audio = document.getElementById("bg-music");
    if (audio.paused) audio.play();
}, { once: true });

door.onclick = () => {
    document.getElementById("main").style.display = "none";
    document.getElementById("hidden").style.display = "block";
};

back.onclick = () => {
    document.getElementById("hidden").style.display = "none";
    document.getElementById("main").style.display = "block";
};
</script>

</body>
</html>
